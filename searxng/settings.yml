use_default_settings: true

general:
  instance_name: "Labfy OSINT Search"
  debug: false

search:
  safe_search: 0
  default_lang: "pt-BR"
  formats:
    - html
    - json

server:
  secret_key: "labfy-osint-searxng-key-2026"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false

  - name: google scholar
    engine: google_scholar
    shortcut: gs
    disabled: true

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
